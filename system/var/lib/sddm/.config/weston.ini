# NumLock on at the SDDM Wayland greeter.
#
# SDDM's own `[General] Numlock=on` only takes effect on the X11 greeter.
# This machine runs the Wayland greeter (DisplayServer=wayland ->
# `weston --shell=kiosk`), where the NumLock state is owned by weston, not
# SDDM. weston reads this file from the sddm user's ~/.config at greeter start.
[keyboard]
numlock-on=true
