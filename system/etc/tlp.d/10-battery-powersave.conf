# /etc/tlp.d/10-battery-powersave.conf
# 三段式電源 profile，給 nierbar 的電源按鈕手動切換用。
#
# TLP 1.10 profile 與參數後綴的對應：
#   performance = *_ON_AC     balanced = *_ON_BAT     power-saver = *_ON_SAV
#   (某參數若沒給 _ON_SAV，power-saver 會 fallback 用 _ON_BAT 的值)
#
# 設計原則：
#   - 插電  → 自動 performance
#   - 拔電  → 自動 balanced（全速可用，不自動節流）
#   - 省電（turbo off + 壓頻 + EPP power）只在「手動選 power-saver」時才套用
#   - 拔電時不會落到 performance（bar 也會隱藏 performance 選項）

# ── profile 自動切換行為 ────────────────────────
# 1=auto：插拔電時切到對應 profile；手動選的 profile 會保留到下次插拔電
TLP_AUTO_SWITCH=1
TLP_PROFILE_AC=PRF          # 插電 → performance
TLP_PROFILE_BAT=BAL         # 拔電 → balanced（刻意不是 SAV）

# ── CPU governor（intel_pstate active 模式只吃 powersave/performance）──
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave
CPU_SCALING_GOVERNOR_ON_SAV=powersave

# ── EPP：能耗偏好 ───────────────────────────────
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
CPU_ENERGY_PERF_POLICY_ON_SAV=power

# ── 最高效能百分比（intel_pstate max_perf_pct）──
CPU_MAX_PERF_ON_AC=100
CPU_MAX_PERF_ON_BAT=100
CPU_MAX_PERF_ON_SAV=70
CPU_MIN_PERF_ON_AC=0
CPU_MIN_PERF_ON_BAT=0
CPU_MIN_PERF_ON_SAV=0

# ── Turbo Boost：只有 power-saver 關閉 ──────────
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1
CPU_BOOST_ON_SAV=0
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=1
CPU_HWP_DYN_BOOST_ON_SAV=0

# ── 平台 profile ────────────────────────────────
# 刻意不由 TLP 管：DivAcerManagerMax (DMAX / linuwu_sense) 也會寫
# /sys/firmware/acpi/platform_profile，兩邊都設會互相覆蓋。
# 讓 DMAX 獨佔這個旋鈕（Acer 熱能/風扇/PL 模式），TLP 只管 CPU 能耗行為。
# 若哪天不用 DMAX 了，解開下面三行即可讓 TLP 接手。
#PLATFORM_PROFILE_ON_AC=balanced
#PLATFORM_PROFILE_ON_BAT=balanced
#PLATFORM_PROFILE_ON_SAV=low-power

# ── PCIe ASPM / runtime PM（只有 power-saver 收更緊，無害）──
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=default
PCIE_ASPM_ON_SAV=powersupersave
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto
RUNTIME_PM_ON_SAV=auto

# ── WiFi 省電 ───────────────────────────────────
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on
WIFI_PWR_ON_SAV=on
